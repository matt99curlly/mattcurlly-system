<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h1 { color: #2c3e50; text-align: center; }
        select, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; }
        button { background-color: #27ae60; color: white; border: none; cursor: pointer; }
        .result { margin-top: 20px; padding: 15px; background: #e8f8f5; border-left: 5px solid #27ae60; }
    </style>
</head>
<body>
    <div class="container">
        <h1>MATTCURLLY's Drug Interaction and Recommendation System</h1>
        <form action="/check" method="post">
            <label>First Drug:</label>
            <select name="drug1">
                {% for drug in drugs %}<option value="{{ drug }}">{{ drug }}</option>{% endfor %}
            </select>
            <label>Second Drug:</label>
            <select name="drug2">
                {% for drug in drugs %}<option value="{{ drug }}">{{ drug }}</option>{% endfor %}
            </select>
            <button type="submit">Check Safety</button>
        </form>

        {% if risk_level %}
        <div class="result">
            <h2>Results for {{ drug1 }} + {{ drug2 }}</h2>
            <p><strong>Risk Level:</strong> {{ risk_level }}</p>
            <p><strong>Effect:</strong> {{ side_effects }}</p>
            <p><strong>Recommendation:</strong> {{ recommendation }}</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
