<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Drug Interaction System</title>
</head>
<body>
    <h1>Check Drug Interactions</h1>
    <form action="/check" method="post">
        First Drug: <input type="text" name="drug1" required><br>
        Second Drug: <input type="text" name="drug2" required><br>
        <button type="submit">Check Safety</button>
    </form>

    {% if risk_level %}
    <div style="margin-top:20px; padding:15px; border:1px solid #000;">
        <h2>Results</h2>
        <p><strong>Drugs:</strong> {{ drug1 }} & {{ drug2 }}</p>
        <p><strong>Risk:</strong> {{ risk_level }}</p>
        <p><strong>Effect:</strong> {{ side_effects }}</p>
        <p><strong>Advice:</strong> {{ recommendation }}</p>
    </div>
    {% endif %}
</body>
</html>
